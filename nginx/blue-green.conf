# Blue-Green Deployment — Nginx Upstream Routing
# ================================================
# Controls live traffic split between Blue (current) and Green (new) backend.
#
# Usage:
#   - Initial state: Blue=100%, Green=0%
#   - After health checks pass on Green: Blue=0%, Green=100%
#   - For rollback: restore Blue=100%, Green=0% and reload Nginx
#
# To apply changes without downtime:
#   docker exec kubevision-nginx-1 nginx -s reload

upstream blue_green_pool {
    # Blue deployment — currently active version
    server backend-blue:3001 weight=100;

    # Green deployment — new version under testing
    server backend-green:3002 weight=0;

    # Keep persistent connections to upstreams
    keepalive 32;
}

server {
    listen 8080;
    server_name localhost;

    location /api/ {
        proxy_pass http://blue_green_pool;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Surface which upstream handled the request for debugging
        add_header X-Served-By $upstream_addr always;
        add_header X-Deployment-Color $upstream_addr always;
    }

    # Health check endpoint (returns 200 if Nginx is alive)
    location /nginx-health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}

